version: "3.9"

services:
  backend:
    build: ./backend
    ports:
      - "8001:8000"
    volumes:
      - ./backend:/app
      - ./ssh_keys:/app/ssh_keys:ro
    environment:
      - AP_DEBUG=true
      - AP_DB_URL=sqlite+aiosqlite:////app/data/arex_platform.db
      - AP_AREX_STORAGE_URL=http://arex-storage:8080
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload
    depends_on:
      - arex-storage

  frontend:
    image: node:20-alpine
    ports:
      - "5174:5173"
    volumes:
      - ./frontend:/app
    working_dir: /app
    command: sh -c "npm install && npm run dev -- --host"

  mongodb:
    image: mongo:5.0
    volumes:
      - mongo_data:/data/db
    ports:
      - "27017:27017"

  arex-redis:
    image: redis:7-alpine
    ports:
      - "6380:6379"

  arex-storage:
    image: arextest/arex-storage:latest
    ports:
      - "8093:8080"
    environment:
      - AREX_MONGO_URI=mongodb://mongodb:27017/arex
      - AREX_REDIS_HOST=arex-redis:6379
    depends_on:
      - mongodb
      - arex-redis

volumes:
  mongo_data:
