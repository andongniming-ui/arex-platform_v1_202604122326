version: "3.9"

services:
  backend:
    build: ./backend
    ports:
      - "8001:8000"
    volumes:
      - ./backend:/app
      - ./ssh_keys:/app/ssh_keys:ro
    environment:
      - AP_DEBUG=true
      - AP_DB_URL=sqlite+aiosqlite:////app/data/arex_platform.db
      - AP_AREX_STORAGE_URL=http://arex-storage:8080
      - AP_AREX_AGENT_STORAGE_URL=http://172.25.109.28:8093
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload
    depends_on:
      - arex-storage

  frontend:
    image: node:20-alpine
    ports:
      - "5174:5173"
    volumes:
      - ./frontend/frontend:/app
    working_dir: /app
    environment:
      - VITE_API_TARGET=http://backend:8000
      - VITE_WS_TARGET=ws://backend:8000
    command: sh -c "npm install && npm run dev -- --host"

  mongodb:
    image: mongo:5.0
    volumes:
      - mongo_data:/data/db
    ports:
      - "27017:27017"

  arex-redis:
    image: redis:7-alpine
    ports:
      - "6380:6379"

  arex-storage:
    image: arexadmin01/arex-storage-serive:0.6.3.2
    ports:
      - "8093:8080"
    environment:
      - JAVA_OPTS=-Darex.mongo.uri=mongodb://mongodb:27017/arex -Darex.redis.uri=redis://arex-redis:6379 -Darex.api.service.api=http://arex-storage:8080
      - TZ=Asia/Shanghai
    depends_on:
      - mongodb
      - arex-redis

volumes:
  mongo_data:
